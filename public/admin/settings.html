<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parametres - Administration</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Tajawal:wght@200;300;400;500;700;800;900&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <div class="admin-wrapper">
    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-content">
      <header class="topbar" id="topbar"></header>
      <div class="content">
        <div class="page-header">
          <h2>Parametres</h2>
          <p>Configuration du tableau de bord</p>
        </div>
        <div class="dashboard-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
          <div class="card">
            <div class="card-header"><h3>Informations du site</h3></div>
            <div class="card-body">
              <div class="alert" id="settings-alert"></div>
              <form id="settings-form">
                <div class="form-group">
                  <label>Nom de la commune</label>
                  <input type="text" id="site_name">
                </div>
                <div class="form-group">
                  <label>Description</label>
                  <textarea id="site_description" rows="3"></textarea>
                </div>
                <div class="form-group">
                  <label>Email de contact</label>
                  <input type="email" id="site_email">
                </div>
                <div class="form-group">
                  <label>Telephone</label>
                  <input type="text" id="site_phone">
                </div>
                <div class="form-group">
                  <label>Adresse</label>
                  <input type="text" id="site_address">
                </div>
                <div class="form-actions">
                  <button type="submit" class="btn btn-primary">Enregistrer</button>
                </div>
              </form>
            </div>
          </div>
          <div>
            <div class="card" style="margin-bottom:20px">
              <div class="card-header"><h3>Statistiques du systeme</h3></div>
              <div class="card-body">
                <div style="display:grid;gap:12px">
                  <div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)">
                    <span>Actualites publiees</span><strong id="sys-news">-</strong>
                  </div>
                  <div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)">
                    <span>Services enregistres</span><strong id="sys-services">-</strong>
                  </div>
                  <div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)">
                    <span>Messages recus</span><strong id="sys-messages">-</strong>
                  </div>
                  <div style="display:flex;justify-content:space-between;padding:10px 0">
                    <span>Messages non lus</span><strong id="sys-unread">-</strong>
                  </div>
                </div>
              </div>
            </div>
            <div class="card">
              <div class="card-header"><h3>Actions rapides</h3></div>
              <div class="card-body">
                <div style="display:flex;flex-direction:column;gap:10px">
                  <a href="actualites.html" class="btn btn-outline" style="justify-content:center">Gerer les actualites</a>
                  <a href="services.html" class="btn btn-outline" style="justify-content:center">Gerer les services</a>
                  <a href="messages.html" class="btn btn-outline" style="justify-content:center">Voir les messages</a>
                  <a href="users.html" class="btn btn-outline" style="justify-content:center">Gerer les utilisateurs</a>
                  <a href="/" class="btn btn-outline" style="justify-content:center" target="_blank">Voir le site public</a>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script src="js/admin.js"></script>
  <script>
    if (!initAdminPage('settings', 'Parametres')) throw new Error('Auth required');

    loadSettings();
    loadStats();

    function loadSettings() {
      AdminAPI.get('settings').then(function(data) {
        if (data.site_name) document.getElementById('site_name').value = data.site_name;
        if (data.site_description) document.getElementById('site_description').value = data.site_description;
        if (data.site_email) document.getElementById('site_email').value = data.site_email;
        if (data.site_phone) document.getElementById('site_phone').value = data.site_phone;
        if (data.site_address) document.getElementById('site_address').value = data.site_address;
      }).catch(function() {
        document.getElementById('site_name').value = 'Commune de Tarmigt';
        document.getElementById('site_description').value = 'Site officiel de la Commune de Tarmigt';
        document.getElementById('site_email').value = 'contact@tarmigt.ma';
        document.getElementById('site_phone').value = '05458585525';
        document.getElementById('site_address').value = 'Siege de la commune, Tarmigt, Ouarzazate';
      });
    }

    function loadStats() {
      AdminAPI.get('stats').then(function(d) {
        document.getElementById('sys-news').textContent = d.actualites.total + ' total (' + d.actualites.published + ' publiees)';
        document.getElementById('sys-services').textContent = d.services.total;
        document.getElementById('sys-messages').textContent = d.contacts.total;
        document.getElementById('sys-unread').textContent = d.contacts.unread;
      }).catch(function() {});
    }

    document.getElementById('settings-form').addEventListener('submit', function(e) {
      e.preventDefault();
      var data = {
        site_name: document.getElementById('site_name').value.trim(),
        site_description: document.getElementById('site_description').value.trim(),
        site_email: document.getElementById('site_email').value.trim(),
        site_phone: document.getElementById('site_phone').value.trim(),
        site_address: document.getElementById('site_address').value.trim()
      };
      if (!data.site_name) { AdminAlert('settings-alert', 'Le nom de la commune est requis', 'danger'); return; }
      AdminAPI.put('settings', data).then(function() {
        AdminToast('Parametres enregistres', 'success');
        AdminAlert('settings-alert', 'Parametres sauvegardes avec succes', 'success');
      }).catch(function(err) {
        AdminAlert('settings-alert', err.error || 'Erreur lors de la sauvegarde', 'danger');
      });
    });
  </script>
</body>
</html>
